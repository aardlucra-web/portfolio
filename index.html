<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- makes it not look zoomed out on phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO stuff — what google shows in search results -->
  <meta name="description" content="Adrianne Ramos — CS student and developer based in Melbourne. Portfolio of Python, web dev, and software projects.">
  <meta name="author" content="Adrianne Ramos">
  <meta name="keywords" content="Adrianne Ramos, developer, portfolio, Python, web development, Melbourne, SAE">

  <!-- og tags = what shows when you share the link on social media -->
  <meta property="og:title" content="Adrianne Ramos - Portfolio">
  <meta property="og:description" content="CS student and developer based in Melbourne.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aardlucra-web.github.io/portfolio/">

  <title>Adrianne Ramos - Portfolio</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- runs before body renders so dark mode doesn't flash white first -->
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark-early');
    }
  </script>
  <style>
    /* prevents white flash on dark mode load */
    html.dark-early body { background: #1C1812 !important; }
  </style>
</head>

<body>

  <!-- the canvas all the panels float on -->
  <main id="desktop">

    <!-- ================================
         HERO CARD
         the main centrepiece
         two columns: name left, links right
         ================================ -->
    <div id="hero-card">

      <!-- dark titlebar, same style as the panels -->
      <div class="hero-titlebar">
        <div class="wm-btn wm-close"></div>
        <div class="wm-btn wm-min"></div>
        <div class="wm-btn wm-max"></div>
        <span class="hero-titlebar-label">adrianne's desktop</span>
      </div>

      <div class="hero-body">

        <!-- left: avatar + name + subtitle -->
        <div class="hero-left">
          <!-- swap avatar emoji for an img tag if you get a photo later -->
          <div class="hero-avatar" id="hero-avatar"></div>
          <h1 class="hero-name" id="hero-name"></h1>
          <p class="hero-subtitle" id="hero-subtitle"></p>
        </div>

        <!-- right: 2x2 grid of section buttons -->
        <!-- data-panel tells JS which panel to open -->
        <nav class="hero-right">
          <button class="hero-link-btn" data-panel="about">
            <span class="hero-link-icon">🙋</span>
            <span class="hero-link-label">about</span>
          </button>
          <button class="hero-link-btn" data-panel="skills">
            <span class="hero-link-icon">⚡</span>
            <span class="hero-link-label">skills</span>
          </button>
          <button class="hero-link-btn" data-panel="projects">
            <span class="hero-link-icon">📁</span>
            <span class="hero-link-label">projects</span>
          </button>
          <button class="hero-link-btn" data-panel="contact">
            <span class="hero-link-icon">✉️</span>
            <span class="hero-link-label">contact</span>
          </button>
        </nav>

      </div>
    </div>


    <!-- ================================
         ABOUT PANEL
         draggable floating window
         ================================ -->
    <div id="panel-about" class="panel">
      <div class="panel-header">
        <div class="wm-btn wm-close"></div>
        <div class="wm-btn wm-min"></div>
        <div class="wm-btn wm-max"></div>
        <span class="panel-title">about.txt</span>
        <!-- the × is what actually closes it -->
        <button class="panel-close-btn" data-close="about">×</button>
      </div>
      <div class="panel-body">
        <!-- all filled by JS from data.js -->
        <p class="about-name" id="about-name"></p>
        <p class="about-meta" id="about-meta"></p>
        <hr class="inner-divider">
        <p class="panel-text" id="about-bio"></p>
        <hr class="inner-divider">
        <div class="section-label">interests</div>
        <div class="tag-row" id="about-tags"></div>
      </div>
    </div>


    <!-- ================================
         SKILLS PANEL
         ================================ -->
    <div id="panel-skills" class="panel">
      <div class="panel-header">
        <div class="wm-btn wm-close"></div>
        <div class="wm-btn wm-min"></div>
        <div class="wm-btn wm-max"></div>
        <span class="panel-title">skills.json</span>
        <button class="panel-close-btn" data-close="skills">×</button>
      </div>
      <div class="panel-body">
        <div class="section-label">hard skills</div>
        <!-- skill bars built by JS -->
        <div id="skills-hard"></div>
        <hr class="inner-divider">
        <div class="section-label">soft skills</div>
        <div class="tag-row" id="skills-soft"></div>
      </div>
    </div>


    <!-- ================================
         PROJECTS PANEL
         ================================ -->
    <div id="panel-projects" class="panel">
      <div class="panel-header">
        <div class="wm-btn wm-close"></div>
        <div class="wm-btn wm-min"></div>
        <div class="wm-btn wm-max"></div>
        <span class="panel-title">projects/</span>
        <button class="panel-close-btn" data-close="projects">×</button>
      </div>
      <div class="panel-body">
        <!-- project cards built by JS -->
        <div id="projects-list"></div>
      </div>
    </div>


    <!-- ================================
         CONTACT PANEL
         ================================ -->
    <div id="panel-contact" class="panel">
      <div class="panel-header">
        <div class="wm-btn wm-close"></div>
        <div class="wm-btn wm-min"></div>
        <div class="wm-btn wm-max"></div>
        <span class="panel-title">contact.md</span>
        <button class="panel-close-btn" data-close="contact">×</button>
      </div>
      <div class="panel-body">
        <div class="section-label">get in touch</div>
        <!-- filled by JS -->
        <a class="contact-email" id="contact-email" href="#"></a>
        <hr class="inner-divider">
        <!-- social buttons built by JS -->
        <div id="contact-socials"></div>
      </div>
    </div>

  </main>


  <!-- ================================
       TASKBAR
       bottom bar with open/close buttons
       ================================ -->
  <footer id="taskbar">
    <span class="taskbar-logo">ari's desktop</span>

    <!-- data-panel matches the panel IDs above -->
    <button class="taskbar-btn" data-panel="about">
      <span class="dot"></span> about
    </button>
    <button class="taskbar-btn" data-panel="skills">
      <span class="dot"></span> skills
    </button>
    <button class="taskbar-btn" data-panel="projects">
      <span class="dot"></span> projects
    </button>
    <button class="taskbar-btn" data-panel="contact">
      <span class="dot"></span> contact
    </button>

    <div class="taskbar-right">
      <div class="toggle-pill" id="dark-toggle">
        <span>dark</span>
        <div class="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>
  </footer>


  <!-- load data first, then main — order matters!! -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
